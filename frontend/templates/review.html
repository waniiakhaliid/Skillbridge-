<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SkillBridge — Leave a Review</title>
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
  <header class="site-nav">
    <div class="brand"><a href="home.html">SkillBridge</a></div>
    <div class="links"><a href="index.html">Login</a></div>
  </header>

  <main class="wrap">
    <section class="card" style="max-width:640px">
      <h1 class="title">Leave a review</h1>
      <div id="worker-summary">
        <!-- populated via app.js if desired -->
        <p><strong>Rashid Khan</strong> — Plumber</p>
      </div>

      <label>Rating</label>
      <div>
        <select id="review-rating">
          <option value="5">5</option>
          <option value="4">4</option>
          <option value="3">3</option>
          <option value="2">2</option>
          <option value="1">1</option>
        </select>
      </div>

      <label style="margin-top:10px">Write your review</label>
      <textarea id="review-text" placeholder="Write your review..." style="width:100%;height:120px;padding:10px;border-radius:8px;border:1px solid #f2d7da"></textarea>
      <div style="margin-top:10px"><button class="btn gradient" id="submit-review" onclick="alert('Review submitted!'); location.href='home.html';">Submit Review</button></div>
    </section>
  </main>

  <script src="../static/js/data.js"></script>
  <script src="../static/js/app.js"></script>
  <script src="../static/js/footer.js"></script>
</body>
</html>
