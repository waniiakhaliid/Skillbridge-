<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SkillBridge — Leave a Review</title>
  <link rel="stylesheet" href="../static/css/style.css">
  <link rel="stylesheet" href="../static/css/home.css">
  <link rel="stylesheet" href="../static/css/dashboard.css">
  <script src="../static/js/theme.js"></script>
</head>
<body>
  <!-- Mobile Sidebar Overlay -->
  <div class="mobile-overlay" id="mobile-overlay"></div>

  <header class="top-navbar">
    <!-- Left: Brand & Main Links -->
    <div style="display: flex; align-items: center; gap: 24px;">
      <a href="home.html" class="navbar-brand">
        <div class="logo-mark">SB</div>
        SkillBridge
      </a>
      <nav class="navbar-links">
        <a class="nav-item" href="home.html">Home</a>
        <a class="nav-item" href="services.html">Services</a>
        <a class="nav-item" href="listing.html">Workers</a>
        <a class="nav-item" href="contact.html">Contact</a>
      </nav>
    </div>

    <!-- Center: Persistent Search Bar -->
    <div class="navbar-search">
      <div class="navbar-search-container">
        <svg class="navbar-search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" placeholder="Search services (Mechanic, Plumber...)" id="nav-search-input">
        <div id="nav-search-dropdown" class="search-dropdown"></div>
      </div>
    </div>

    <!-- Right: Actions & Theme Toggle -->
    <div class="navbar-actions">
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
        <svg id="moon-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg id="sun-icon" style="display:none" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>

      <div class="profile-dropdown-container">
        <div class="profile-trigger" id="profile-trigger">
          <img src="https://i.pravatar.cc/150?img=68" class="user-avatar" alt="Avatar">
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN PAGE -->
  <main style="max-width:1920px; width:100%; margin:24px auto 64px auto; padding:0 4%; min-height:100vh;">

    <!-- JS will inject the review UI here -->
    <div id="review-container" style="width:100%; max-width:640px; margin:0 auto;">

      <!-- Loading state -->
      <div style="padding:40px; text-align:center; color:var(--muted);">
        Loading review form...
      </div>

    </div>

  </main>

   <!-- SCRIPTS -->
  <!-- load data from database -->
  <script src="../static/js/config.js"></script>
  <script src="../static/js/api.js"></script>
  <script src="../static/js/data.js"></script>

  <script src="../static/js/booking.js"></script> 
  <script src="../static/js/profile.js"></script>
  <script src="../static/js/dashboard.js"></script>
  <script src="../static/js/footer.js"></script>
  <script src="../static/js/search.js"></script>
  <script src="../static/js/session.js"></script>
  <script>
    const stars = document.querySelectorAll('.star');
    const ratingInput = document.getElementById('review-rating');

    stars.forEach(star => {
      star.addEventListener('click', () => {
        const value = star.dataset.value;
        ratingInput.value = value;
        stars.forEach(s => {
          if (s.dataset.value <= value) {
            s.textContent = '★';
            s.style.color = '#f59e0b';
          } else {
            s.textContent = '☆';
            s.style.color = '#ccc';
          }
        });
      });
    });

    // Set default 5 stars
    stars.forEach(s => {
      s.textContent = '★';
      s.style.color = '#f59e0b';
    });
  </script>

  <script>
    // Only runs on review page
    if (document.getElementById('review-container')) {
      window.addEventListener('skillbridge-ready', function () {
        const workerId = new URLSearchParams(location.search).get('worker');
        const container = document.getElementById('review-container');

        if (!workerId) {
          container.innerHTML = '<p>Worker not specified. Redirecting...</p>';
          setTimeout(() => location.href = 'home.html', 1400);
          return;
        }

        const w = SKILLBRIDGE_DATA.workers.find(x => x.id === workerId);

        if (!w) {
          container.innerHTML = '<p>Worker not found. Redirecting...</p>';
          setTimeout(() => location.href = 'listing.html', 1400);
          return;
        }

        container.innerHTML = `
          <div class="card" style="padding:32px;border:1px solid var(--border);">
            <h1 style="margin:0 0 20px;font-size:28px;color:var(--text);">Leave a Review</h1>
            <div id="worker-summary" style="margin-bottom:24px;padding:16px;background:var(--surface);border-radius:8px;border:1px solid var(--border);">
              <div style="display:flex;align-items:center;gap:12px;">
                <img src="${w.photo || 'https://i.pravatar.cc/150?u=' + w.id}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;">
                <div>
                  <div style="font-weight:700;font-size:18px;color:var(--text);">${w.name}</div>
                  <div style="color:var(--muted);">${w.service} Professional</div>
                </div>
              </div>
            </div>

            <label style="font-weight:600;font-size:16px;display:block;margin-bottom:12px;color:var(--text);">Rating</label>
            <div id="star-rating" style="font-size: 28px; margin-bottom: 20px; cursor: pointer;">
              <span class="star" data-value="1" style="cursor: pointer;">★</span>
              <span class="star" data-value="2" style="cursor: pointer;">★</span>
              <span class="star" data-value="3" style="cursor: pointer;">★</span>
              <span class="star" data-value="4" style="cursor: pointer;">★</span>
              <span class="star" data-value="5" style="cursor: pointer;">★</span>
            </div>
            <input type="hidden" id="review-rating" value="5">

            <label style="font-weight:600;font-size:16px;display:block;margin-bottom:12px;color:var(--text);">Write your review</label>
            <textarea id="review-text" placeholder="Share your experience with this professional..." style="width:100%;height:140px;padding:14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;resize:none;margin-bottom:24px;"></textarea>
            <button class="btn gradient" id="submit-review" style="width:100%;padding:14px;border-radius:10px;font-weight:600;font-size:16px;background:var(--primary);color:white;border:none;cursor:pointer;">Submit Review</button>
          </div>
        `;

        // Re-attach star event listeners
        const newStars = container.querySelectorAll('.star');
        const newRatingInput = container.querySelector('#review-rating');
        newStars.forEach(star => {
          star.addEventListener('click', () => {
            const value = star.dataset.value;
            newRatingInput.value = value;
            newStars.forEach(s => {
              if (s.dataset.value <= value) {
                s.textContent = '★';
                s.style.color = '#f59e0b';
              } else {
                s.textContent = '☆';
                s.style.color = '#ccc';
              }
            });
          });
        });

        // Submit review
        container.querySelector('#submit-review').addEventListener('click', () => {
          const rating = newRatingInput.value;
          const text = container.querySelector('#review-text').value.trim();
          if (!text) {
            alert('Please write a review.');
            return;
          }
          alert(`Review submitted! Rating: ${rating}, Text: ${text}`);
          location.href = 'home.html';
        });
      });
    }
  </script>
</body>
</html>
