<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta property="og:image" content="../static/images/static.gif">
  <title>SkillBridge — Verification in Progress</title>
  <link rel="stylesheet" href="../static/css/style.css">
  <link rel="stylesheet" href="../static/css/auth.css">
  <script src="../static/js/theme.js"></script>
</head>
<body style="background:var(--bg); color:var(--text)">
  <!-- Floating Theme Toggle -->
  <div style="position: fixed; top: 24px; right: 24px; z-index: 1000;">
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
      <svg id="moon-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
      <svg id="sun-icon" style="display:none" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </button>
  </div>

  <!-- Simple Centered Layout -->
  <main style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
    
    <div style="background:var(--card);max-width:480px;width:100%;border-radius:24px;padding:48px 32px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,0.1);border:1px solid var(--border)">
      
      <div class="status-icon-lg">
        <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
      </div>

      <h1 style="margin:0 0 12px;font-size:28px">Analysis in Progress</h1>
      <p class="muted" style="margin:0 0 24px;line-height:1.6;font-size:15px">Thank you for submitting your documents! Our trust and safety team is currently reviewing your application.</p>
      
      <div style="background:rgba(245, 158, 11, 0.05);border-radius:12px;padding:16px;margin-bottom:32px;border:1px solid rgba(245, 158, 11, 0.2)">
        <div style="font-weight:700;color:#d97706;margin-bottom:4px">Current Status: Pending Review</div>
        <div style="font-size:13px;color:#b45309">Estimated completion time: 24 - 48 hours</div>
      </div>

      <p style="font-size:14px;color:var(--muted);margin-bottom:32px">We will notify you via email as soon as your account is approved and ready to accept bookings.</p>
      
      <button class="btn outline" onclick="location.href='index.html'" style="max-width:240px">Return to Login</button>
    </div>

  </main>

  <script src="../static/js/footer.js"></script>
</body>
</html>
