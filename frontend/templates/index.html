<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SkillBridge — Login</title>
  <link rel="stylesheet" href="../static/css/style.css">
  <link rel="stylesheet" href="../static/css/auth.css">
  <script src="../static/js/theme.js"></script>
</head>
<body style="background-color: var(--bg); color: var(--text);">
  <!-- Floating Theme Toggle -->
  <div style="position: fixed; top: 24px; right: 24px; z-index: 1000;">
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
      <svg id="moon-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
      <svg id="sun-icon" style="display:none" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </button>
  </div>

  <!-- Split Auth Layout -->
  <main class="auth-split">
    <!-- Left panel decorative image (Hidden on mobile) -->    <div class="auth-panel-img" aria-hidden="true">
      <div class="animation-scene">
        <div class="central-orb">SB</div>
        <div class="tool-orbit">
          <!-- Wrench (Mechanic) -->
          <div class="tool-item">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
          </div>
          <!-- Hammer (Carpenter) -->
          <div class="tool-item">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 5 4 4"></path><path d="M7 21a5 5 0 0 1-5-5"></path><path d="M13 3a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h9z"></path><path d="M17.7 7.7a2.5 2.5 0 1 1 3.5 3.5L18 14.5l-3.5-3.5 3.2-3.3z"></path><path d="m3 21 8-8"></path></svg>
          </div>
          <!-- Droplet (Plumber) -->
          <div class="tool-item">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"></path></svg>
          </div>
          <!-- Zap (Electrician) -->
          <div class="tool-item">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
          </div>
          <!-- Settings (General) -->
          <div class="tool-item">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 1 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          </div>
          <!-- Truck (Transportation/Mechanic) -->
          <div class="tool-item">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>
          </div>
          <!-- Clipboard (Service) -->
          <div class="tool-item">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
          </div>
          <!-- User Check (Verified Workers) -->
          <div class="tool-item">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline></svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Right panel login form -->
    <div class="auth-panel-form">
      <div class="auth-card">
        <!-- Logo -->
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:32px">
          <div class="logo-mark" style="width:40px;height:40px;border-radius:12px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700">SB</div>
          <div class="brand" style="font-weight:700;font-size:22px;color:var(--text)">SkillBridge</div>
        </div>

        <h1 style="margin:0 0 8px;font-size:32px;letter-spacing:-0.5px">Welcome Back</h1>
        <p class="muted" style="margin-bottom:32px;font-size:15px">Please enter your details to log in to your account.</p>

        <form id="login-form">
          <!-- Email Input -->
          <div class="input-group">
            <label class="input-label" for="email">Email or Phone Number</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
              <input class="modern-input" id="email" type="text" placeholder="Enter your email or phone" required>
            </div>
            <div class="error" id="email-error"></div>
          </div>

          <!-- Password Input -->
          <div class="input-group">
            <label class="input-label" for="password">Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
              <input class="modern-input has-toggle" id="password" type="password" placeholder="Enter your password" required>
              <button type="button" class="toggle-pwd" id="toggle-pwd" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </button>
            </div>
            <div class="error" id="password-error"></div>
          </div>

          <!-- Role Selection -->
          <div style="margin-bottom:24px">
            <label style="display:block;margin-bottom:12px;font-size:14px;font-weight:600">I am a:</label>
            <div style="display:flex;gap:16px">
              <label style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border:1px solid var(--border);border-radius:12px;cursor:pointer;background:var(--card);transition:border-color 0.2s">
                <input type="radio" name="login_role" value="customer" checked style="accent-color:var(--primary)">
                Customer
              </label>
              <label style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border:1px solid var(--border);border-radius:12px;cursor:pointer;background:var(--card);transition:border-color 0.2s">
                <input type="radio" name="login_role" value="worker" style="accent-color:var(--primary)">
                Worker
              </label>
            </div>
          </div>

          <!-- Options Row -->
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
            <label style="display:flex;align-items:center;gap:8px;font-size:14px;color:var(--muted);cursor:pointer">
              <input type="checkbox" id="remember" style="width:16px;height:16px;accent-color:var(--primary);cursor:pointer">
              Remember me
            </label>
            <a href="forgot-password.html" style="font-size:14px;color:var(--primary);text-decoration:none;font-weight:600">Forgot Password?</a>
          </div>

          <!-- Submit -->
          <button id="submit-login" type="submit" class="btn gradient" style="padding:14px;font-size:16px">Log in</button>
        </form>

        <p style="text-align:center;margin-top:24px;color:var(--muted);font-size:15px">
          Don't have an account? 
          <a href="role-selection.html" id="signup-link" style="color:var(--primary);font-weight:600;text-decoration:none">Sign Up</a>
        </p>

      </div>
    </div>
  </main>

  

  <script>
    // Password Visibility Toggle
    const pwdInput = document.getElementById('password');
    const toggleBtn = document.getElementById('toggle-pwd');
    toggleBtn.addEventListener('click', () => {
      const type = pwdInput.getAttribute('type') === 'password' ? 'text' : 'password';
      pwdInput.setAttribute('type', type);
      // Change icon (Eye / Eye Off)
      if(type === 'text') {
        toggleBtn.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
      } else {
        toggleBtn.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
      }
    });

  </script>
  // connect auth.js for login logic
  <script src="../static/js/auth.js"></script>
  <script src="../static/js/footer.js"></script>
</body>
</html>
